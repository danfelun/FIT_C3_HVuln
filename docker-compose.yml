services:
  nmap:
    image: instrumentisto/nmap:latest
    container_name: fit-nmap
    volumes:
      - ./resultados:/resultados
    network_mode: bridge

  nikto:
    image: ghcr.io/sullo/nikto:latest
    container_name: fit-nikto
    volumes:
      - ./resultados:/resultados
    network_mode: bridge

  nuclei:
    image: projectdiscovery/nuclei:latest
    container_name: fit-nuclei
    volumes:
      - ./resultados:/resultados
      - nuclei_data:/root/.config/nuclei
    network_mode: bridge

  zap:
    image: zaproxy/zap-stable:latest
    container_name: fit-zap
    user: root
    volumes:
      - ./resultados:/zap/wrk/resultados
    working_dir: /zap/wrk
    network_mode: bridge

  metasploit:
    build:
      context: .
      dockerfile: Dockerfile.metasploit
    image: fit-metasploit:local
    container_name: fit-metasploit
    stdin_open: true
    tty: true
    ports:
      - "4444:4444"
      - "5555:5555"
    volumes:
      - msf_data:/root/.msf4
      - ./resultados:/workspace/resultados
      - ./scripts/metasploit:/workspace/scripts
    working_dir: /workspace
    network_mode: bridge
    command: ["sleep", "infinity"]

volumes:
  nuclei_data:
  msf_data:
